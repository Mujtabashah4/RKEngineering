<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Industrial Green Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7a4e;stop-opacity:1" />
    </linearGradient>
    <!-- Wheat Gold Accent -->
    <linearGradient id="wheatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a439;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b84a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background - Rounded Square (Industrial Shape) -->
  <rect x="4" y="4" width="92" height="92" rx="12" ry="12" fill="url(#primaryGrad)"/>

  <!-- Industrial Border -->
  <rect x="4" y="4" width="92" height="92" rx="12" ry="12" fill="none" stroke="url(#wheatGrad)" stroke-width="3"/>

  <!-- Gear Teeth (Subtle Background Element) -->
  <g opacity="0.15" fill="white">
    <rect x="45" y="2" width="10" height="8" rx="2"/>
    <rect x="45" y="90" width="10" height="8" rx="2"/>
    <rect x="2" y="45" width="8" height="10" rx="2"/>
    <rect x="90" y="45" width="8" height="10" rx="2"/>
  </g>

  <!-- RK Monogram -->
  <text x="50" y="62"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="42"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="2">RK</text>

  <!-- Wheat Accent Line (Bottom) -->
  <rect x="20" y="75" width="60" height="4" rx="2" fill="url(#wheatGrad)"/>

  <!-- Small Cog Icon (Top Right Corner) -->
  <g transform="translate(75, 20)" fill="url(#wheatGrad)">
    <circle cx="0" cy="0" r="6" fill="url(#wheatGrad)"/>
    <circle cx="0" cy="0" r="2.5" fill="url(#primaryGrad)"/>
    <rect x="-1" y="-9" width="2" height="4" rx="0.5"/>
    <rect x="-1" y="5" width="2" height="4" rx="0.5"/>
    <rect x="-9" y="-1" width="4" height="2" rx="0.5"/>
    <rect x="5" y="-1" width="4" height="2" rx="0.5"/>
  </g>
</svg>
